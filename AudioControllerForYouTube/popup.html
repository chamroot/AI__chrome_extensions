<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Controller for YouTube</title>
<style>
:root {
  --bg: #0f0f11;
  --card: #18181b;
  --input: #222225;
  --text: #f4f4f5;
  --subtext: #a1a1aa;
  --border: #2f2f35;
  --primary: rgb(120, 86, 255);
  --primary-light: rgba(120, 86, 255, 0.15);
  --danger: #ff6b6b;
}

* {
  box-sizing: border-box;
}

body {
  width: 340px;
  margin: 0;
  padding: 16px;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  user-select: none;
}

/* =========================
  ヘッダー
========================== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.title-area {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 24px;
}

.extension-icon {
  width: 24px;
  height: 24px;
  object-fit: contain;
  border-radius: 6px;
}

.extension-icon:not([src]),
.extension-icon[src=""] {
  visibility: hidden;
}

.title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.version {
  font-size: 11px;
  color: var(--subtext);
  font-variant-numeric: tabular-nums;
}

/* =========================
  セクション
========================== */
.section {
  margin-bottom: 12px;
  padding: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-title {
  margin: 0;
  font-size: 13px;
  font-weight: 700;
}

.section-content {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* =========================
  設定行 & コントロール
========================== */
.control-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.control-row:last-child {
  margin-bottom: 0;
}

.control-label-wrap {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}

.control-label {
  color: var(--subtext);
  font-size: 12px;
}

.control-value {
  font-weight: 600;
  color: var(--primary);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

/* スライダー共通 */
input[type="range"] {
  outline: none;
}

.control-row input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 5px;
  background: var(--input);
  border-radius: 3px;
  border: 1px solid var(--border);
}

.control-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  transition: transform 0.1s ease;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

.control-row input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
}

/* =========================
  3バンド EQ Grid
========================== */
.eq-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.eq-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: var(--input);
  padding: 10px 4px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.eq-col .control-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--subtext);
}

.eq-col .control-value {
  font-size: 11px;
  font-weight: 600;
}

.eq-col input[type="range"] {
  writing-mode: bt-lr;
  -webkit-appearance: slider-vertical;
  accent-color: var(--primary);
  width: 8px;
  height: 90px;
  padding: 0;
  margin: 4px 0;
  cursor: pointer;
}

/* =========================
  オーディオモニター（RMS）
========================== */
.meter-box {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--input);
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.meter-readout {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}

.meter-bar-container {
  width: 100%;
  height: 6px;
  background: #111113;
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.meter-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary) 70%, var(--danger) 95%);
  transition: width 0.05s ease-out;
  will-change: width;
}

/* =========================
  ボタン
========================== */
.reset-btn {
  width: 100%;
  padding: 8px;
  background: var(--card);
  color: var(--subtext);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.2s, color 0.2s, border-color 0.2s;
  margin-top: 2px;
}

.reset-btn:hover {
  background: var(--input);
  color: var(--text);
  border-color: var(--subtext);
}

.reset-btn:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}
</style>
</head>
<body>

<!-- ヘッダー -->
<header class="header">
  <div class="title-area">
    <img id="app-icon" class="extension-icon" alt="アイコン">
    <div class="title" id="app-title"></div>
  </div>
  <div class="version" id="app-version"></div>
</header>

<!-- 基本操作 -->
<section class="section">
  <div class="section-header">
    <h2 class="section-title">基本操作</h2>
  </div>

  <div class="section-content">
    <!-- 音量: 0% ～ 200% -->
    <div class="control-row">
      <div class="control-label-wrap">
        <label for="vol-slider" class="control-label">音量</label>
        <span class="control-value" id="vol-val">100%</span>
      </div>
      <input type="range" id="vol-slider" min="0" max="2" step="0.02" value="1" aria-label="音量調整">
    </div>

    <!-- 再生速度: 0.25x ～ 10.00x -->
    <div class="control-row">
      <div class="control-label-wrap">
        <label for="speed-slider" class="control-label">再生速度</label>
        <span class="control-value" id="speed-val">1.00x</span>
      </div>
      <input type="range" id="speed-slider" min="0.25" max="10" step="0.05" value="1" aria-label="再生速度調整">
    </div>
  </div>
</section>

<!-- 3バンド イコライザー -->
<section class="section">
  <div class="section-header">
    <h2 class="section-title">3Band EQ</h2>
  </div>

  <div class="section-content">
    <div class="eq-grid">
      <div class="eq-col">
        <label for="low-slider" class="control-label">LOW</label>
        <span class="control-value" id="low-val">0 dB</span>
        <input type="range" id="low-slider" min="-20" max="20" step="1" value="0" aria-label="低音イコライザー">
      </div>
      <div class="eq-col">
        <label for="mid-slider" class="control-label">MID</label>
        <span class="control-value" id="mid-val">0 dB</span>
        <input type="range" id="mid-slider" min="-20" max="20" step="1" value="0" aria-label="中音イコライザー">
      </div>
      <div class="eq-col">
        <label for="high-slider" class="control-label">HIGH</label>
        <span class="control-value" id="high-val">0 dB</span>
        <input type="range" id="high-slider" min="-20" max="20" step="1" value="0" aria-label="高音イコライザー">
      </div>
    </div>
  </div>
</section>

<!-- オーディオモニター -->
<section class="section">
  <div class="section-header">
    <h2 class="section-title">オーディオモニター</h2>
  </div>

  <div class="section-content">
    <div class="meter-box">
      <div class="meter-readout">
        <span class="control-label">RMS レベル</span>
        <span class="control-value" id="rms-val">-∞ dBFS</span>
      </div>
      <div class="meter-bar-container">
        <div class="meter-bar-fill" id="rms-bar"></div>
      </div>
    </div>
  </div>
</section>

<button class="reset-btn" id="reset-btn">設定をリセット</button>

<script src="popup.js"></script>
</body>
</html>
