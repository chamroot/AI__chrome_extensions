<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Audio Controller for YouTube</title>
<style>
:root {
  --bg: #0f0f11;
  --card: #18181b;
  --input: #222225;
  --text: #f4f4f5;
  --subtext: #a1a1aa;
  --border: #2f2f35;
  --primary: rgb(120, 86, 255);
  --primary-light: rgba(120, 86, 255, 0.15);
  --danger: #ff6b6b;
}

* {
  box-sizing: border-box;
}

body {
  width: 340px;
  margin: 0;
  padding: 16px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  user-select: none;
}

/* =========================
  ヘッダー
========================== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.title-area {
  display: flex;
  align-items: center;
  gap: 8px;
}

.extension-icon {
  width: 24px;
  height: 24px;
  object-fit: contain;
  border-radius: 6px;
}

.title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.version {
  font-size: 11px;
  color: var(--subtext);
}

/* =========================
  セクション
========================== */
.section {
  margin-bottom: 12px;
  padding: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-title {
  font-size: 13px;
  font-weight: 700;
}

.section-content {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* =========================
  設定行 & コントロール
========================== */
.control-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.control-row:last-child {
  margin-bottom: 0;
}

.control-label-wrap {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}

.control-label {
  color: var(--subtext);
  font-size: 12px;
}

.control-value {
  font-weight: 600;
  color: var(--primary);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

/* 横向きスライダー */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 5px;
  background: var(--input);
  border-radius: 3px;
  outline: none;
  border: 1px solid var(--border);
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  transition: transform 0.1s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
}

/* =========================
  3バンド EQ Grid
========================== */
.eq-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.eq-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: var(--input);
  padding: 10px 4px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.eq-col .control-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--subtext);
}

.eq-col .control-value {
  font-size: 11px;
  font-weight: 600;
}

/* 縦向きスライダー (3Band EQ) */
.eq-col input[type="range"] {
  writing-mode: bt-lr; /* Firefox */
  -webkit-appearance: slider-vertical; /* Webkit / Chrome / Edge */
  accent-color: var(--primary); /* ★ つまみの色を紫に指定 */
  width: 8px;
  height: 90px;
  padding: 0;
  margin: 4px 0;
  cursor: pointer;
}

/* =========================
  オーディオモニター（RMS）
========================== */
.meter-box {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--input);
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.meter-readout {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}

.meter-bar-container {
  width: 100%;
  height: 6px;
  background: #111113;
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.meter-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary) 70%, var(--danger) 95%);
  transition: width 0.08s ease-out;
}

/* =========================
  ボタン
========================== */
.reset-btn {
  width: 100%;
  padding: 8px;
  background: var(--card);
  color: var(--subtext);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  margin-top: 2px;
}

.reset-btn:hover {
  background: var(--input);
  color: var(--text);
  border-color: var(--subtext);
}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="title-area">
    <img src="icons/icon32.png" class="extension-icon" alt="icon">
    <div class="title" id="app-title">Audio Controller</div>
  </div>
  <div class="version">v0.0.1</div>
</div>

<!-- 基本操作 -->
<div class="section">
  <div class="section-header">
    <div class="section-title">基本操作</div>
  </div>

  <div class="section-content">
    <!-- 音量: 0% ～ 200% -->
    <div class="control-row">
      <div class="control-label-wrap">
        <span class="control-label">音量</span>
        <span class="control-value" id="vol-val">100%</span>
      </div>
      <input type="range" id="vol-slider" min="0" max="2" step="0.02" value="1">
    </div>

    <!-- 再生速度: 0.25x ～ 10.00x -->
    <div class="control-row">
      <div class="control-label-wrap">
        <span class="control-label">再生速度</span>
        <span class="control-value" id="speed-val">1.00x</span>
      </div>
      <input type="range" id="speed-slider" min="0.25" max="10" step="0.05" value="1">
    </div>
  </div>
</div>

<!-- 3バンド イコライザー -->
<div class="section">
  <div class="section-header">
    <div class="section-title">3Band EQ</div>
  </div>

  <div class="section-content">
    <div class="eq-grid">
      <div class="eq-col">
        <span class="control-label">LOW</span>
        <span class="control-value" id="low-val">0 dB</span>
        <input type="range" id="low-slider" min="-20" max="20" step="1" value="0">
      </div>
      <div class="eq-col">
        <span class="control-label">MID</span>
        <span class="control-value" id="mid-val">0 dB</span>
        <input type="range" id="mid-slider" min="-20" max="20" step="1" value="0">
      </div>
      <div class="eq-col">
        <span class="control-label">HIGH</span>
        <span class="control-value" id="high-val">0 dB</span>
        <input type="range" id="high-slider" min="-20" max="20" step="1" value="0">
      </div>
    </div>
  </div>
</div>

<!-- オーディオモニター -->
<div class="section">
  <div class="section-header">
    <div class="section-title">オーディオモニター</div>
  </div>

  <div class="section-content">
    <div class="meter-box">
      <div class="meter-readout">
        <span class="control-label">RMS レベル</span>
        <span class="control-value" id="rms-val">-∞ dBFS</span>
      </div>
      <div class="meter-bar-container">
        <div class="meter-bar-fill" id="rms-bar"></div>
      </div>
    </div>
  </div>
</div>

<button class="reset-btn" id="reset-btn">設定をリセット</button>

<script src="popup.js"></script>
</body>
</html>
